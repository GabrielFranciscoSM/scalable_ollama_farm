services:
  ollama1:
    image: ollama/ollama:latest
    container_name: fase0-ollama1
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

  ollama2:
    image: ollama/ollama:latest
    container_name: fase0-ollama2
    ports:
      - "11435:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

  ollama3:
    image: ollama/ollama:latest
    container_name: fase0-ollama3
    ports:
      - "11436:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: fase0-litellm
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]
    depends_on:
      - ollama1
      - ollama2
      - ollama3
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: fase0-nginx
    depends_on:
      - litellm
    ports:
      - "8088:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  ollama: