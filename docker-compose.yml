services:

  nginx:
    image: nginx:alpine
    container_name: semantic-cache-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - litellm
    networks:
      - semantic-cache-net
    restart: unless-stopped

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: semantic-cache-litellm
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/configv2.yaml:/app/config.yaml:ro
    environment:
      LITELLM_CONFIG_PATH: /app/config.yaml
      LITELLM_MODE: "production_no_db"
      DISABLE_SCHEMA_UPDATE: "true"
      # litellm.embedding("ollama/...") reads this to know where Ollama is
      OLLAMA_API_BASE: "http://ollama-embed:11434"
    command: ["--config", "/app/config.yaml", "--port", "4000", "--detailed_debug"]
    depends_on:
      redis:
        condition: service_healthy
      ollama-embed:
        condition: service_healthy
      ollama-1:
        condition: service_started
      ollama-2:
        condition: service_started
    networks:
      - semantic-cache-net
    restart: on-failure

  redis:
    image: redis/redis-stack:latest
    container_name: semantic-cache-redis
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - semantic-cache-net
    restart: unless-stopped

  ollama-1:
    image: ollama/ollama:latest
    container_name: semantic-cache-ollama-1
    ports:
      - "11434:11434"
    volumes:
      - ollama-1-data:/root/.ollama
      - ./scripts/ollama-init.sh:/ollama-init.sh:ro
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && sh /ollama-init.sh && wait"]
    environment:
      OLLAMA_HOST: "0.0.0.0"
    networks:
      - semantic-cache-net
    restart: unless-stopped

  ollama-2:
    image: ollama/ollama:latest
    container_name: semantic-cache-ollama-2
    ports:
      - "11436:11434"
    volumes:
      - ollama-2-data:/root/.ollama
      - ./scripts/ollama-init.sh:/ollama-init.sh:ro
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && sh /ollama-init.sh && wait"]
    environment:
      OLLAMA_HOST: "0.0.0.0"
    networks:
      - semantic-cache-net
    restart: unless-stopped

  ollama-embed:
    image: ollama/ollama:latest
    container_name: semantic-cache-ollama-embed
    ports:
      - "11435:11434"
    volumes:
      - ollama-embed-data:/root/.ollama
      - ./scripts/ollama-embed-init.sh:/ollama-init.sh:ro
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && sh /ollama-init.sh && wait"]
    environment:
      OLLAMA_HOST: "0.0.0.0"
    healthcheck:
      test: ["CMD", "sh", "-c", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    networks:
      - semantic-cache-net
    restart: unless-stopped

volumes:
  redis-data:
  ollama-1-data:
  ollama-2-data:
  ollama-embed-data:

networks:
  semantic-cache-net:
    driver: bridge