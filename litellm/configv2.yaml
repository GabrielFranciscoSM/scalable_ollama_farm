model_list:
  # ── Qwen3.5 0.8b via Ollama 1 ───────────────
  - model_name: qwen3
    litellm_params:
      model: ollama/qwen3.5:0.8b
      api_base: http://ollama-1:11434
      timeout: 60
      stream_timeout: 120

  # ── Qwen3.5 0.8b via Ollama 2 ───────────────
  - model_name: qwen3
    litellm_params:
      model: ollama/qwen3.5:0.8b
      api_base: http://ollama-2:11434
      timeout: 60
      stream_timeout: 120

  # ── Nomic embed (for cache lookups) ─────────
  - model_name: nomic-embed
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://ollama-embed:11434

router_settings:
  routing_strategy: least-busy
  num_retries: 2
  retry_after: 5
  timeout: 30

litellm_settings:
  cache: true
  cache_params:
    type: redis-semantic
    redis_url: redis://redis:6379
    similarity_threshold: 0.85
    # Must be the full provider/model string — the router is NOT available during cache init
    redis_semantic_cache_embedding_model: ollama/nomic-embed-text
    ttl: 3600

  drop_params: true
  request_timeout: 60
  telemetry: false
  success_callback: []
  failure_callback: []

general_settings:
  disable_spend_logs: true
  disable_master_key_hashing: true