events {
    worker_connections 1024;
}

http {
    # ── Upstream: LiteLLM ───────────────────────────────────────────
    upstream litellm_backend {
        server litellm:4000;
        keepalive 32;
    }

    # ── Logging helpers ────────────────────────────────────────────
    log_format cache_log '$remote_addr - $request_method $request_uri '
                         'status=$status upstream=$upstream_response_time '
                         'cache=$upstream_http_x_litellm_cache_hit';

    access_log /var/log/nginx/access.log cache_log;
    error_log  /var/log/nginx/error.log warn;

    # ── Default timeouts (LLM inference can be slow) ───────────────
    proxy_connect_timeout  10s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;
    send_timeout          120s;

    # ── Main server block ──────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Health check endpoint (no auth required)
        location /health {
            proxy_pass http://litellm_backend/health;
            proxy_http_version 1.1;
        }

        # LiteLLM UI / metrics (optional debug access)
        location /metrics {
            proxy_pass http://litellm_backend/metrics;
            proxy_http_version 1.1;
        }

        # All API traffic → LiteLLM
        location / {
            proxy_pass         http://litellm_backend;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Required for streaming responses (SSE)
            proxy_set_header   Connection "";
            proxy_buffering    off;
            proxy_cache        off;
            chunked_transfer_encoding on;

            # Expose cache hit header to clients for research observation
            add_header X-Cache-Hit $upstream_http_x_litellm_cache_hit always;
        }
    }
}